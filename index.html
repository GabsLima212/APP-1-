<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Vaga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Verificação de Elegibilidade</h2>
        <form id="vagaForm">
            <div class="input-group">
                <label for="nome">Nome completo:</label>
                <input type="text" id="nome" required placeholder="Digite seu nome">
            </div>

            <div class="input-group">
                <label for="idade">Idade:</label>
                <input type="number" id="idade" required min="0" placeholder="Ex: 25">
            </div>

            <div class="input-group">
                <label for="altura">Altura (em metros):</label>
                <input type="number" id="altura" required step="0.01" min="0" placeholder="Ex: 1.75">
            </div>

            <button type="button" id="btnVerificar">Verificar Vaga</button>
        </form>

        <div id="resultado" class="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
